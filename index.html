
  <!DOCTYPE html>
  <html lang="ru">
    <head>

      <meta charset="UTF-8" />
      <!-- Точный APP ICON из брендборда MYRA -->
      <link rel="icon" type="image/png" sizes="512x512" href="./favicon.png" />
      <link rel="icon" type="image/x-icon" href="./favicon.ico" />
      <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
      <link rel="manifest" href="./manifest.webmanifest" />
      <meta name="theme-color" content="#050510" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>MYRA</title>
      <meta name="description" content="MYRA — стриминг, социальные плейлисты и загрузка треков для независимых артистов в одном приложении." />
      <meta name="robots" content="index, follow" />
      <link rel="canonical" href="https://app.myramusic.ru/" />
      <meta property="og:type" content="website" />
      <meta property="og:site_name" content="MYRA" />
      <meta property="og:locale" content="ru_RU" />
      <meta property="og:url" content="https://app.myramusic.ru/" />
      <meta property="og:title" content="MYRA" />
      <meta property="og:description" content="Музыка, независимые артисты и живое сообщество в одном приложении." />
      <!-- og:image абсолютный: краулеры соцсетей не резолвят относительные пути -->
      <meta property="og:image" content="https://app.myramusic.ru/icon-reference-master.png" />
      <meta property="og:image:alt" content="MYRA" />
      <meta name="twitter:card" content="summary" />
      <meta name="twitter:title" content="MYRA" />
      <meta name="twitter:description" content="Музыка, независимые артисты и живое сообщество в одном приложении." />
      <meta name="twitter:image" content="https://app.myramusic.ru/icon-reference-master.png" />
      <style>
        html, body { height: 100%; margin: 0; background: #050510; }
        #root { min-height: 100%; }
        #myra-boot {
          min-height: 100vh;
          min-height: 100dvh;
          display: grid;
          place-items: center;
          color: #fff7f2;
          background:
            radial-gradient(circle at 50% 48%, rgba(230, 146, 119, .09), transparent 34%),
            #050510;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .myra-boot__content {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 20px;
        }
        .myra-boot__wordmark {
          color: #fff8f4;
          font-size: 28px;
          font-weight: 760;
          letter-spacing: .2em;
          line-height: 1;
          text-align: center;
          text-indent: .2em;
          text-shadow: 0 0 28px rgba(238, 160, 130, .18);
        }
        .myra-boot__signal {
          width: 72px;
          height: 16px;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 5px;
          color: #eba985;
        }
        .myra-boot__signal i {
          width: 2px;
          height: 10px;
          border-radius: 999px;
          background: currentColor;
          opacity: .36;
          transform-origin: center;
          animation: myra-boot-pulse 1.15s ease-in-out infinite;
        }
        .myra-boot__signal i:nth-child(2),
        .myra-boot__signal i:nth-child(6) { animation-delay: .1s; }
        .myra-boot__signal i:nth-child(3),
        .myra-boot__signal i:nth-child(5) { animation-delay: .2s; }
        .myra-boot__signal i:nth-child(4) { animation-delay: .3s; }
        .myra-boot__label {
          color: rgba(255,247,242,.42);
          font-size: 9px;
          font-weight: 600;
          letter-spacing: .18em;
          text-transform: uppercase;
        }
        @keyframes myra-boot-pulse {
          0%, 100% { opacity: .24; transform: scaleY(.45); }
          50% { opacity: .95; transform: scaleY(1.35); }
        }
        @media (prefers-reduced-motion: reduce) {
          .myra-boot__signal i { animation: none; opacity: .65; }
        }
      </style>

    </head>

    <body>

      <div id="root">
        <div id="myra-boot" role="status" aria-label="MYRA загружается">
          <div class="myra-boot__content">
            <div class="myra-boot__wordmark" aria-hidden="true">MYRA</div>
            <div class="myra-boot__signal" aria-hidden="true">
              <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
            </div>
            <div class="myra-boot__label">настраиваем звук</div>
          </div>
        </div>
      </div>
      <script type="module" src="/src/main.tsx"></script>

    </body>
  </html>
