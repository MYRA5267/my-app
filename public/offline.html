<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>MYRA — офлайн</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; height: 100%; padding: 24px; box-sizing: border-box; text-align: center;
    background: #050510; color: #f2f2f8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wordmark {
    font-size: 32px; font-weight: 800; letter-spacing: -0.03em;
    background: linear-gradient(90deg, #a78bfa, #7dd3fc, #f6b8c8);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  h1 { font-size: 18px; font-weight: 700; margin: 0; }
  p { font-size: 14px; line-height: 1.5; margin: 0; max-width: 320px; color: rgba(242,242,248,0.55); }
  button {
    margin-top: 8px; padding: 12px 28px; border-radius: 999px; border: none;
    background: linear-gradient(135deg, #a78bfa, #8b5cf6); color: #fff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:active { opacity: 0.8; }
</style>
</head>
<body>
  <div class="wordmark">MYRA</div>
  <h1>Нет соединения с сетью</h1>
  <p>
    Похоже, устройство сейчас офлайн. Локально сохранённые треки и демо-каталог
    доступны только внутри самого приложения — эта страница показывается,
    когда даже открыть его не удалось.
  </p>
  <button onclick="location.reload()">Повторить</button>
</body>
</html>
