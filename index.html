
  <!DOCTYPE html>
  <html lang="ru">
    <head>

      <meta charset="UTF-8" />
      <!-- Точный APP ICON из брендборда MYRA -->
      <link rel="icon" type="image/png" sizes="512x512" href="./favicon.png" />
      <link rel="icon" type="image/x-icon" href="./favicon.ico" />
      <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
      <link rel="manifest" href="./manifest.webmanifest" />
      <meta name="theme-color" content="#050510" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>MYRA</title>
      <meta name="description" content="MYRA — стриминг, социальные плейлисты и загрузка треков для независимых артистов в одном приложении." />
      <meta name="robots" content="index, follow" />
      <meta property="og:type" content="website" />
      <meta property="og:title" content="MYRA" />
      <meta property="og:description" content="Музыка, независимые артисты и живое сообщество в одном приложении." />
      <meta property="og:image" content="./icon-reference-master.png" />
      <style>
        html, body { height: 100%; margin: 0; background: #050510; }
        #root { min-height: 100%; }
        #myra-boot {
          min-height: 100vh;
          min-height: 100dvh;
          display: grid;
          place-items: center;
          overflow: hidden;
          color: #fff7f2;
          background:
            radial-gradient(circle at 50% 42%, rgba(255, 150, 112, .15), transparent 30%),
            radial-gradient(circle at 58% 52%, rgba(183, 120, 255, .11), transparent 42%),
            #050510;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .myra-boot__mark {
          position: relative;
          width: 76px;
          height: 76px;
          display: grid;
          place-items: center;
          border: 1px solid rgba(255,255,255,.12);
          border-radius: 28px;
          background: linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.025));
          box-shadow: 0 22px 64px rgba(0,0,0,.48), 0 0 44px rgba(255,145,107,.13);
        }
        .myra-boot__mark::before {
          content: "M";
          font-size: 32px;
          font-weight: 800;
          letter-spacing: -.08em;
          background: linear-gradient(125deg, #fff9f5 12%, #ffad88 52%, #c394ff 92%);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }
        .myra-boot__mark::after {
          content: "";
          position: absolute;
          inset: -7px;
          border: 1px solid transparent;
          border-top-color: rgba(255,178,141,.82);
          border-radius: 32px;
          animation: myra-boot-spin 1.15s linear infinite;
        }
        .myra-boot__label {
          margin-top: 22px;
          color: rgba(255,247,242,.62);
          font-size: 11px;
          font-weight: 650;
          letter-spacing: .28em;
          text-align: center;
          text-transform: uppercase;
        }
        @keyframes myra-boot-spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) { .myra-boot__mark::after { animation: none; } }
      </style>

    </head>

    <body>

      <div id="root">
        <div id="myra-boot" role="status" aria-label="MYRA загружается">
          <div>
            <div class="myra-boot__mark" aria-hidden="true"></div>
            <div class="myra-boot__label">MYRA</div>
          </div>
        </div>
      </div>
      <script type="module" src="/src/main.tsx"></script>

    </body>
  </html>
