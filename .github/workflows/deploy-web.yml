# Веб-версия MYRA: автодеплой на GitHub Pages при каждом пуше в main.
# Чтобы заработало, один раз в настройках репозитория:
#   Settings → Pages → Source: «GitHub Actions».
# Если нужен онлайн-режим (Supabase), добавить секреты репозитория
#   VITE_SUPABASE_URL и VITE_SUPABASE_ANON_KEY — без них приложение
#   собирается и работает в офлайн-режиме, как и задумано.
# Если нужна отправка ошибок в Sentry, добавить секрет репозитория
#   VITE_SENTRY_DSN — без него приложение собирается и работает как раньше,
#   просто без телеметрии ошибок (см. src/app/sentry.ts).
name: deploy-web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AUTH_REDIRECT_URL: ${{ vars.VITE_AUTH_REDIRECT_URL }}
          VITE_OAUTH_PROVIDERS: ${{ vars.VITE_OAUTH_PROVIDERS }}
          VITE_PASSKEYS_ENABLED: ${{ vars.VITE_PASSKEYS_ENABLED }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
