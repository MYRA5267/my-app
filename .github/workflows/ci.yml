# Гейт на каждый PR: typecheck + build должны быть зелёными до мерджа.
# Намеренно без секретов Supabase/Sentry — сборка обязана проходить и в
# полностью офлайн-конфигурации (см. CLAUDE.md, "optional-backend pattern"),
# так что CI заодно проверяет именно этот инвариант, а не только компиляцию.
name: ci

on:
  pull_request:
    branches: [main, staging, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Раннер GitHub Actions не имеет предустановленного браузера (в отличие от
      # dev-песочницы) — ставим Chromium явно перед e2e-тестами.
      - run: npx playwright install --with-deps chromium
      # test:e2e сам вызывает `pnpm build && pnpm preview` через webServer в
      # playwright.config.ts, поэтому повторный `pnpm build` тут не нужен.
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
